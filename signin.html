<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your Ilocos Norte Tourism account.">
  <title>Sign In — Ilocos Norte</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="loading-screen">
  <div class="loader-logo">Ilocos <span>Norte</span></div>
  <div class="loader-sub">Crown of the North</div>
  <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
</div>
<div class="page-transition"></div>
<canvas id="particles-canvas"></canvas>
<div id="progress-bar"></div>

<canvas id="particles-canvas"></canvas>
<div id="progress-bar"></div>
<header class="site-header">
  <nav class="main-navbar navbar navbar-expand-lg" style="border-bottom:1px solid var(--glass-border);">
    <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
      <a class="navbar-brand" href="index.html">
        <div class="logo-icon"><i class="fas fa-compass" style="color:#fff"></i></div>
        <div class="logo-text-wrap">
          <span class="logo-title">Ilocos Norte</span>
          <span class="logo-sub">Philippines</span>
        </div>
      </a>
      <div class="nav-auth-btns">
        <label class="dark-toggle-wrap">
          <input type="checkbox" id="dark-mode-toggle">
          <span class="dark-toggle-track"></span>
        </label>
        <a href="signup.html" class="btn-nav-signup">Create Account</a>
      </div>
    </div>
  </nav>
</header>

<div class="auth-page">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5 col-xl-4">
        <div class="auth-card">
          <div class="text-center mb-4">
            <div class="logo-icon mx-auto mb-3" style="width:60px;height:60px;font-size:26px;">
              <i class="fas fa-compass" style="color:#fff"></i>
            </div>
            <div class="auth-title">Welcome Back</div>
            <p class="auth-subtitle">Sign in to your Ilocos Norte Tourism account</p>
          </div>

          <form id="contact-form">
            <div class="form-group">
              <label class="form-label">Email Address</label>
              <input type="email" class="form-input" placeholder="your@email.com" required>
              <span class="field-msg"></span>
            </div>
            <div class="form-group">
              <label class="form-label">Password</label>
              <div style="position:relative;">
                <input type="password" id="password-input" class="form-input" placeholder="Enter your password" required style="padding-right:48px;">
                <button type="button" onclick="var i=this.previousElementSibling;i.type=i.type==='password'?'text':'password';this.innerHTML=i.type==='password'?'<i class='fas fa-eye'></i>':'<i class='fas fa-eye-slash'></i>';"
                  style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,0.4);cursor:pointer;font-size:14px;padding:0;">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
              <div class="pw-strength-bar-wrap mt-2"><div id="pw-bar"></div></div>
              <span id="pw-label" style="font-size:11px;color:rgba(255,255,255,0.45);margin-top:4px;display:block;"></span>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-4">
              <label style="display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,0.6);cursor:pointer;">
                <input type="checkbox" style="accent-color:var(--sky);"> Remember me
              </label>
              <a href="#" style="font-size:12px;color:var(--sky);">Forgot password?</a>
            </div>
            <button type="submit" class="btn-sunset w-100 justify-content-center" style="padding:15px;">
              <i class="fas fa-sign-in-alt me-2"></i>Sign In
            </button>
          </form>

          <div class="auth-divider">or continue with</div>
          <div class="d-flex gap-3 mb-4">
            <button class="btn-outline-glass w-50 justify-content-center" style="padding:12px;font-size:13px;">
              <i class="fab fa-google me-2" style="color:#ea4335;"></i>Google
            </button>
            <button class="btn-outline-glass w-50 justify-content-center" style="padding:12px;font-size:13px;">
              <i class="fab fa-facebook-f me-2" style="color:#1877f2;"></i>Facebook
            </button>
          </div>

          <p class="text-center" style="font-size:13px;color:rgba(255,255,255,0.5);">
            Don't have an account? <a href="signup.html" style="color:var(--sky);font-weight:600;">Create one free</a>
          </p>
        </div>

        <p class="text-center mt-3">
          <a href="index.html" style="font-size:12px;color:rgba(255,255,255,0.35);"><i class="fas fa-arrow-left me-1"></i>Back to Homepage</a>
        </p>
      </div>
    </div>
  </div>
</div>

<div id="cookie-banner">
  <p><i class="fas fa-cookie-bite"></i> We use cookies to enhance your browsing experience.</p>
  <div class="cookie-btns"><button id="cookie-accept">Accept All</button><button id="cookie-decline">Decline</button></div>
</div>
<button id="back-to-top" title="Back to top"><i class="fas fa-chevron-up"></i></button>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
